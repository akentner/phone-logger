{% extends "base.html" %}
{% block title %}Anrufe{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Anruf-Historie</h2>
    </div>
    <div class="search-bar">
        <input type="text" class="form-control" id="search-number" placeholder="Rufnummer filtern...">
        <button class="btn btn-primary" onclick="loadCalls()">Suchen</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Zeitpunkt</th>
                    <th>Richtung</th>
                    <th>Event</th>
                    <th>Nummer</th>
                    <th>Name</th>
                    <th>Quelle</th>
                    <th>Aktionen</th>
                </tr>
            </thead>
            <tbody id="calls-table">
                <tr><td colspan="7">Lade...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="pagination" id="pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    const pageSize = 50;

    async function loadCalls(page = 1) {
        currentPage = page;
        const number = document.getElementById('search-number').value;
        let url = `/api/calls?page=${page}&page_size=${pageSize}`;
        if (number) url += `&number=${encodeURIComponent(number)}`;

        try {
            const data = await apiCall(url);
            renderCalls(data);
        } catch (e) {
            showAlert('Fehler beim Laden: ' + e.message, 'error');
        }
    }

    function renderCalls(data) {
        const tbody = document.getElementById('calls-table');
        if (data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">Keine Anrufe vorhanden</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        tbody.innerHTML = data.items.map(c => `
            <tr>
                <td>${formatDate(c.timestamp)}</td>
                <td>
                    <span class="${c.direction === 'inbound' ? 'direction-in' : 'direction-out'}">
                        ${c.direction === 'inbound' ? '&#x2199;&#xFE0F; Eingehend' : '&#x2197;&#xFE0F; Ausgehend'}
                    </span>
                </td>
                <td>${c.event_type}</td>
                <td><strong>${c.number}</strong></td>
                <td>${c.resolved_name || '<em style="color:var(--text-secondary)">Unbekannt</em>'}</td>
                <td>${c.source || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-outline" onclick="resolveNumber('${c.number}')">Auflösen</button>
                </td>
            </tr>
        `).join('');

        // Pagination
        const totalPages = Math.ceil(data.total / pageSize);
        const pag = document.getElementById('pagination');
        if (totalPages <= 1) {
            pag.innerHTML = '';
            return;
        }
        let html = '';
        if (currentPage > 1) {
            html += `<button class="btn btn-sm btn-outline" onclick="loadCalls(${currentPage - 1})">&#x276E; Zurück</button>`;
        }
        html += `<span>Seite ${currentPage} von ${totalPages} (${data.total} Einträge)</span>`;
        if (currentPage < totalPages) {
            html += `<button class="btn btn-sm btn-outline" onclick="loadCalls(${currentPage + 1})">Weiter &#x276F;</button>`;
        }
        pag.innerHTML = html;
    }

    async function resolveNumber(number) {
        try {
            const result = await apiCall(`/api/resolve/${encodeURIComponent(number)}`);
            showAlert(`${number}: ${result.name} (Quelle: ${result.source})`);
        } catch (e) {
            showAlert(`Nicht auflösbar: ${number}`, 'error');
        }
    }

    document.getElementById('search-number').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadCalls();
    });

    loadCalls();
</script>
{% endblock %}
