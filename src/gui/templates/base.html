<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>phone-logger - {% block title %}{% endblock %}</title>
    <script>
        // Dark mode detection — runs before CSS to avoid flash of wrong theme.
        // 1) OS / browser preference via matchMedia
        // 2) HA ingress fallback: check background-color that HA injects into the iframe
        (function() {
            var isDark = false;
            // Primary: OS-level dark mode preference
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                isDark = true;
            }
            // HA ingress fallback: HA sets --primary-background-color on the iframe body.
            // In dark themes this is a dark color (luminance < 0.5).
            // We also check the body background-color computed style once the DOM is ready.
            if (!isDark && /\/api\/hassio_ingress\//.test(window.location.pathname)) {
                // Try to detect via HA-injected CSS custom property on the document
                var bg = getComputedStyle(document.documentElement).getPropertyValue('--primary-background-color');
                if (bg) {
                    // Parse rgb(r,g,b) and check luminance
                    var m = bg.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
                    if (m) {
                        var lum = (0.299 * parseInt(m[1]) + 0.587 * parseInt(m[2]) + 0.114 * parseInt(m[3])) / 255;
                        if (lum < 0.5) isDark = true;
                    }
                }
            }
            if (isDark) {
                document.documentElement.classList.add('dark');
            }
            // Listen for OS preference changes (e.g. user toggles system dark mode)
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    document.documentElement.classList.toggle('dark', e.matches);
                });
            }
        })();
    </script>
    <link rel="stylesheet" id="main-css" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>phone-logger</h1>
        <ul class="nav-links">
            <li><a href="/pbx" data-path="/pbx" class="{% if active == 'pbx' %}active{% endif %}">Telefonanlage</a></li>
            <li><a href="/contacts" data-path="/contacts" class="{% if active == 'contacts' %}active{% endif %}">Kontakte</a></li>
            <li><a href="/calls" data-path="/calls" class="{% if active == 'calls' %}active{% endif %}">Anrufe</a></li>
            <li><a href="/cache" data-path="/cache" class="{% if active == 'cache' %}active{% endif %}">Cache</a></li>
            <li><a href="/config" data-path="/config" class="{% if active == 'config' %}active{% endif %}">Konfiguration</a></li>
            <li><a href="/docs" data-path="/docs" target="_blank">API Docs</a></li>
        </ul>
    </nav>

    <div class="container">
        <div id="alert-container"></div>
        {% block content %}{% endblock %}
    </div>

    <footer class="app-footer">
        <span>phone-logger v{{ request.app.version }}</span>
    </footer>

    <script>
        // Ingress base path detection for HA Addon
        const INGRESS_PATH = window.location.pathname.match(/^\/api\/hassio_ingress\/[^/]+/) 
            ? window.location.pathname.match(/^\/api\/hassio_ingress\/[^/]+/)[0] 
            : '';

        // Rewrite absolute URLs for ingress compatibility
        if (INGRESS_PATH) {
            document.getElementById('main-css').href = INGRESS_PATH + '/static/css/style.css';
            document.querySelectorAll('a[data-path]').forEach(a => {
                a.href = INGRESS_PATH + a.dataset.path;
            });
            // HA ingress dark mode re-check: HA may inject --primary-background-color
            // on the document after initial load. Re-evaluate if not already dark.
            if (!document.documentElement.classList.contains('dark')) {
                var bg = getComputedStyle(document.documentElement).getPropertyValue('--primary-background-color');
                if (bg) {
                    var m = bg.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
                    if (m) {
                        var lum = (0.299 * parseInt(m[1]) + 0.587 * parseInt(m[2]) + 0.114 * parseInt(m[3])) / 255;
                        if (lum < 0.5) document.documentElement.classList.add('dark');
                    }
                }
            }
        }
        
        // I18n support
        let i18n = {};
        let currentLang = 'de';

        async function loadTranslations(lang = 'de') {
            try {
                const data = await apiCall(`/api/i18n/translations?lang=${lang}`);
                i18n = data.translations;
                currentLang = data.lang;
            } catch (e) {
                console.error('Failed to load translations:', e);
            }
        }

        function t(key) {
            const parts = key.split('.');
            let result = i18n;
            for (const part of parts) {
                if (result && typeof result === 'object' && part in result) {
                    result = result[part];
                } else {
                    return key; // Fallback to key
                }
            }
            return result;
        }

        function apiUrl(path) {
            return INGRESS_PATH + path;
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 4000);
        }

        async function apiCall(path, options = {}) {
            const url = apiUrl(path);
            const defaults = {
                headers: { 'Content-Type': 'application/json' },
            };
            const response = await fetch(url, { ...defaults, ...options });
            if (!response.ok) {
                const error = await response.json().catch(() => ({ detail: 'Request failed' }));
                throw new Error(error.detail || `HTTP ${response.status}`);
            }
            if (response.status === 204) return null;
            return response.json();
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            const d = new Date(isoString);
            return d.toLocaleString('de-DE', { 
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit' 
            });
        }

        function spamScoreClass(score) {
            if (!score) return '';
            if (score <= 3) return 'spam-score-low';
            if (score <= 6) return 'spam-score-mid';
            return 'spam-score-high';
        }

        // Load translations on page load
        loadTranslations('de');
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
