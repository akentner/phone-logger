    const LINE_STATUS_COLORS = {
        idle:       'grey',
        ring:       '#3092dc',
        call:       '#8bbf68',
        talking:    '#4caf50',
        finished:   'grey',
        missed:     '#e45f3b',
        notReached: '#e45f3b',
    };

    /* Direction-specific overrides for "finished" status */
    const FINISHED_DIRECTION_MAP = {
        inbound:  { icon: 'inbound',  color: '#3092dc' },
        outbound: { icon: 'outgoing', color: '#8bbf68' },
    };

    /** Return the SVG icon markup for a given status (and optional direction). */
    function lineStatusIcon(status, direction) {
        if (status === 'finished' && direction && FINISHED_DIRECTION_MAP[direction]) {
            return LINE_STATUS_ICONS[FINISHED_DIRECTION_MAP[direction].icon] || LINE_STATUS_ICONS.finished;
        }
        return LINE_STATUS_ICONS[status] || LINE_STATUS_ICONS.idle;
    }

    /** Return the color for a given status (and optional direction). */
    function lineStatusColor(status, direction) {
        if (status === 'finished' && direction && FINISHED_DIRECTION_MAP[direction]) {
            return FINISHED_DIRECTION_MAP[direction].color;
        }
        return LINE_STATUS_COLORS[status] || LINE_STATUS_COLORS.idle;
    }

    /* Mapping from call history status to icon/color keys */
    const CALL_STATUS_MAP = {
        ringing:    { icon: 'ring',       color: '#3092dc' },
        dialing:    { icon: 'call',       color: '#8bbf68' },
        answered:   { icon: 'talking',    color: '#4caf50' },
        missed:     { icon: 'missed',     color: '#e45f3b' },
